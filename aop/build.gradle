plugins {
    id 'java-library'
    id 'maven-publish'
}

group = 'com.callv2'
version = '0.0.1-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {

    implementation 'org.aspectj:aspectjrt:1.9.24'

}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

tasks.named('test') {
    useJUnitPlatform()
}
